<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Match</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
</head>
<body>
    <div id="sectionRedDotGame">
        <div class="fmm-wrapper">
            <div class="fmm-header">
                <h1 class="fmm-title">👨‍💻 Code Match! 🚀</h1>
            </div>

            <div class="fmm-stats">
                <div class="fmm-stat">⏱️ <span id="fmm-timer">00:00</span></div>
                <div class="fmm-stat">🔄 <span id="fmm-flips">0</span> flips</div>
                <div class="fmm-stat">❌ <span id="fmm-errors">0</span> bugs</div>
            </div>

            <div id="fmm-board" class="fmm-board"></div>
            <!-- Win message (hidden until win) -->
            <div id="fmm-win-msg" class="fmm-win-msg" style="display:none;">
                <div class="fmm-win-ico">🏆</div>
                <h2 class="fmm-win-title">Deployed to Production!</h2>
                <p id="fmm-win-stats" class="fmm-win-stats"></p>
            </div>

            <!-- Controls -->
            <div class="fmm-controls">
                <button id="fmm-start-btn" class="fmm-btn fmm-btn-start">🎬 Run Script</button>
                <button id="fmm-reset-btn" class="fmm-btn fmm-btn-reset" style="display:none;">🔄 Restart Server</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    
</body>
</html>
